version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - rust

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "04:10"
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - rust

  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    labels:
      - dependencies
      - ui
