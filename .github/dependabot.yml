version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 8

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "04:10"
    open-pull-requests-limit: 8

  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
    open-pull-requests-limit: 10
    groups:
      ui-vite-stack:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "vitest"
          - "@vitest/*"
      ui-lint-stack:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@eslint/js"
        update-types:
          - "version-update:semver-major"
